version: '3.8'

services:
  # Database PostgreSQL
  db:
    image: postgres:15
    container_name: erp_postgres
    environment:
      POSTGRES_USER: erp_admin
      POSTGRES_PASSWORD: Avario050306
      POSTGRES_DB: erp_saas_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp_admin"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for BullMQ Queue & Caching
  redis:
    image: redis:7-alpine
    container_name: erp_redis
    ports:
      - "6379:6379"

  # NestJS API (Backend)
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: erp_api
    environment:
      DATABASE_URL: "postgresql://erp_admin:erp_password_secure@db:5432/erp_saas_db?schema=public"
      REDIS_URL: "redis://redis:6379"
      NODE_ENV: "production"
      PORT: "3000"
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "npx prisma migrate deploy && npm run start:prod"

volumes:
  pgdata:
